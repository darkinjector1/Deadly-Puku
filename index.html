<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ADRITA MONDAL</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>

body{
margin:0;
padding:0;
background:black;
font-family:sans-serif;
overflow:hidden;
text-align:center;
color:white;
}

canvas{
position:fixed;
top:0;
left:0;
z-index:-1;
}

.container{
padding-top:40px;
}

.profile-pic{
width:190px;
height:190px;
border-radius:50%;
object-fit:cover;
border:4px solid #00ff00;
box-shadow:0 0 30px #00ff00,0 0 60px #00ff00;
margin-bottom:25px;
}

.name{
font-size:45px;
font-weight:bold;
letter-spacing:4px;
text-transform:uppercase;
color:#00ff00;
animation:glow 2s infinite alternate;
}

@keyframes glow{
0%{
text-shadow:0 0 10px #00ff00,0 0 20px #00ff00;
}
100%{
text-shadow:0 0 30px #00ff00,0 0 70px #00ff00;
}
}

.love{
font-size:25px;
color:red;
animation:heart 1s infinite;
}

@keyframes heart{
0%{transform:scale(1);}
50%{transform:scale(1.3);}
100%{transform:scale(1);}
}

a{
display:flex;
align-items:center;
justify-content:center;
gap:12px;
margin:15px auto;
padding:15px;
width:300px;
text-decoration:none;
font-weight:bold;
letter-spacing:2px;
border-radius:8px;
text-transform:uppercase;
background:black;
color:#00ff00;
border:2px solid #00ff00;
box-shadow:0 0 15px #00ff00;
transition:.3s;
}

a:hover{
background:#00ff00;
color:black;
transform:scale(1.07);
box-shadow:0 0 40px #00ff00;
}

</style>
</head>

<body>

<canvas id="matrix"></canvas>

<div class="container">

<img src="IMG_1493.jpeg" class="profile-pic">

<div class="name">ADRITA MONDAL</div>

<div class="love"></div>

<a href="https://www.youtube.com/@deadly_puku" target="_blank">
<i class="fab fa-youtube"></i> YOUTUBE CHANNEL
</a>

<a href="https://facebook.com/deadlypuku" target="_blank">
<i class="fab fa-facebook"></i> FACEBOOK PAGE
</a>

<a href="https://www.instagram.com/deadly_puku/" target="_blank">
<i class="fab fa-instagram"></i> INSTAGRAM
</a>

<a href="https://www.facebook.com/share/1DNSTAugq6/?mibextid=wwXIfr" target="_blank">
<i class="fab fa-facebook"></i> FACEBOOK PROFILE
</a>
<div style="color:#00ff00; margin-top:20px; font-size:18px;">
VISITORS :
<img src="https://hitwebcounter.com/counter/counter.php?page=12345678&style=0006&nbdigits=5&type=page&initCount=0" />
</div>
</div>

<script>

var canvas=document.getElementById("matrix");
var ctx=canvas.getContext("2d");

canvas.height=window.innerHeight;
canvas.width=window.innerWidth;

var letters="01";
letters=letters.split("");

var fontSize=14;
var columns=canvas.width/fontSize;
var drops=[];

for(var x=0;x<columns;x++)
drops[x]=1;

function draw(){

ctx.fillStyle="rgba(0,0,0,0.05)";
ctx.fillRect(0,0,canvas.width,canvas.height);

ctx.fillStyle="#00ff00";
ctx.font=fontSize+"px monospace";

for(var i=0;i<drops.length;i++){

var text=letters[Math.floor(Math.random()*letters.length)];

ctx.fillText(text,i*fontSize,drops[i]*fontSize);

if(drops[i]*fontSize>canvas.height && Math.random()>0.975)
drops[i]=0;

drops[i]++;

}

}
  
setInterval(draw,33);
</script>

  <audio autoplay loop>
  <source src="hacker.mp3.mp4" type="audio/mpeg">
</audio>
<audio id="clickSound">
  <source src="click.mp3.webm" type="audio/webm">
</audio>

<script>
document.querySelectorAll("a").forEach(function(btn){
  btn.addEventListener("click", function(){
    document.getElementById("clickSound").play();
  });
});
</script>
</body>
</html>
