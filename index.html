<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>𝘼𝘿𝙍𝙄𝙏𝘼</title>

<style>

body{
margin:0;
padding:0;
background:black;
font-family:sans-serif;
text-align:center;
color:white;
overflow:hidden;
}

canvas{
position:fixed;
top:0;
left:0;
z-index:-1;
}

.container{
margin-top:80px;
}

.profile{
width:180px;
height:180px;
border-radius:50%;
border:5px solid #00ff00;
box-shadow:0 0 30px #00ff00;
}

.name{
font-size:40px;
color:#00ff00;
margin-top:20px;
text-shadow:0 0 20px #00ff00;
}

.btn{
display:block;
width:260px;
margin:20px auto;
padding:15px;
text-decoration:none;
color:#00ff00;
border:2px solid #00ff00;
border-radius:10px;
background:black;
box-shadow:0 0 15px #00ff00;
font-size:18px;
transition:.3s;
}

.btn:hover{
background:#00ff00;
color:black;
transform:scale(1.07);
box-shadow:0 0 40px #00ff00;
}

</style>
</head>

<body>

<canvas id="matrix"></canvas>

<div class="container">

<img src="IMG_1493.jpeg" class="profile">

<div class="name">ADRITA MONDAL</div>

<a class="btn" href="https://www.youtube.com/@deadly_puku">YOUTUBE CHANNEL</a>

<a class="btn" href="https://www.facebook.com/share/1B1JZ7xvwR/?mibextid=wwXIfr">FACEBOOK PAGE</a>

<a class="btn" href="https://www.instagram.com/deadly_puku?igsh=dWh5Z3I0aDF3Z2xt">INSTAGRAM</a>

<a class="btn" href="https://www.facebook.com/share/17wxXegACi/?mibextid=wwXIfr">FACEBOOK PROFILE</a>

</div>

<audio autoplay loop>
<source src="hacker.mp3.mp4" type="audio/mpeg">
</audio>

<audio id="clickSound">
<source src="click.mp3.webm" type="audio/webm">
</audio>

<script>

document.querySelectorAll(".btn").forEach(function(btn){
btn.addEventListener("click",function(){
document.getElementById("clickSound").play();
});
});

var canvas=document.getElementById("matrix");
var ctx=canvas.getContext("2d");

canvas.height=window.innerHeight;
canvas.width=window.innerWidth;

var letters="101010101010101010101010";
letters=letters.split("");

var fontSize=14;
var columns=canvas.width/fontSize;

var drops=[];
for(var x=0;x<columns;x++)
drops[x]=1;

function draw(){

ctx.fillStyle="rgba(0,0,0,0.05)";
ctx.fillRect(0,0,canvas.width,canvas.height);

ctx.fillStyle="#00ff00";
ctx.font=fontSize+"px monospace";

for(var i=0;i<drops.length;i++){

var text=letters[Math.floor(Math.random()*letters.length)];

ctx.fillText(text,i*fontSize,drops[i]*fontSize);

if(drops[i]*fontSize>canvas.height && Math.random()>0.975)
drops[i]=0;

drops[i]++;
}
}

setInterval(draw,33);

</script>

</body>
</html>
