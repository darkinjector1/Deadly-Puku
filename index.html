<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Deadly Puku | Official</title>

<style>
body {
    margin: 0;
    padding: 0;
    background: black;
    font-family: monospace;
    overflow: hidden;
    color: #00ff00;
    text-align: center;
}

/* Matrix Background */
canvas {
    position: fixed;
    top: 0;
    left: 0;
    z-index: -1;
}

/* Main Box */
.container {
    position: relative;
    top: 50%;
    transform: translateY(-50%);
}

h1 {
    font-size: 40px;
    text-shadow: 0 0 15px #00ff00;
}

a {
    display: block;
    margin: 15px;
    padding: 12px;
    text-decoration: none;
    color: #00ff00;
    border: 1px solid #00ff00;
    width: 250px;
    margin-left: auto;
    margin-right: auto;
    transition: 0.3s;
}

a:hover {
    background: #00ff00;
    color: black;
    box-shadow: 0 0 20px #00ff00;
}
</style>
</head>

<body>

<canvas id="matrix"></canvas>

<div class="container">
    <h1>DEADLY PUKU</h1>

    <a href="https://www.youtube.com/@deadly_puku" target="_blank">YouTube Channel</a>
    <a href="https://facebook.com/deadlypuku" target="_blank">Facebook Page</a>
    <a href="https://www.instagram.com/deadly_puku" target="_blank">Instagram</a>
    <a href="https://www.facebook.com/share/1SVES9SjLU/?mibextid=wwXIfr" target="_blank">Facebook Profile</a>
</div>

<script>
var canvas = document.getElementById("matrix");
var ctx = canvas.getContext("2d");

canvas.height = window.innerHeight;
canvas.width = window.innerWidth;

var letters = "01";
letters = letters.split("");

var fontSize = 14;
var columns = canvas.width / fontSize;

var drops = [];
for (var x = 0; x < columns; x++)
    drops[x] = 1;

function draw() {
    ctx.fillStyle = "rgba(0, 0, 0, 0.05)";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.fillStyle = "#00ff00";
    ctx.font = fontSize + "px monospace";

    for (var i = 0; i < drops.length; i++) {
        var text = letters[Math.floor(Math.random() * letters.length)];
        ctx.fillText(text, i * fontSize, drops[i] * fontSize);

        if (drops[i] * fontSize > canvas.height && Math.random() > 0.975)
            drops[i] = 0;

        drops[i]++;
    }
}

setInterval(draw, 33);
</script>

</body>
</html>
